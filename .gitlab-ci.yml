variables:
  DOCKER_TLS_CERTDIR: ""
  APPLICATION_NAME: "fhir-server"

stages:
  - test
  - build
  - deploy

include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Secret-Detection.latest.gitlab-ci.yml
  - template: Security/License-Scanning.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml

cache:
  paths:
    - .m2/repository

sast:
  stage: test
  services:
    - docker:dind
  tags:
    - docker

unit-test:
  stage: test
  image: docker.io/library/maven:3.9.4-eclipse-temurin-17
  script:
    - mvn test
  only:
    - merge_requests
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/
