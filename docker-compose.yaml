services:
  clinomic-fhir-server:
    build:
      context: .
      target: tomcat
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - /tmp:/tmp
      - ./lucenefiles:/app/target/lucenefiles/
    depends_on:
      - clinomic-fhir-postgres

  clinomic-fhir-postgres:
    build: ./config/database
    environment:
      SERVER_NAME: fhir
      POSTGRES_DB: hapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data/pgdata

volumes:
  postgres:
    driver: local