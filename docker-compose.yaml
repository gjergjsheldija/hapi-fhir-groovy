services:
  clinomic-fhir-server:
    build:
      context: .
      target: tomcat
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - /tmp:/tmp
      - ./lucenefiles:/app/target/lucenefiles/
    depends_on:
      - clinomic-fhir-postgres

  clinomic-fhir-postgres:
    build: ./config/database
    environment:
      SERVER_NAME: fhir
      POSTGRES_DB: hapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data/pgdata

  karate:
    entrypoint: '/wait-for-it.sh clinomic-fhir-server:8080/fhir -t 60 -- java -cp "/utils/*" com.intuit.karate.Main'
    image: www.clinomic.biz:5050/mona/karate:0.0.1
    environment:
      URL_BASE: 'http://clinomic-fhir-server:8080/fhir'
    volumes:
      - ./tests:/tests
    user: "${UID}:${GID}"
    command:
      - "/tests/integration/custom-configuration.feature"
      - "/tests/integration/auditevent.feature"
      - "/tests/integration/scripting.feature"
      - "/tests/utils.feature"
    depends_on:
      - clinomic-fhir-postgres
      - clinomic-fhir-server


volumes:
  postgres:
    driver: local