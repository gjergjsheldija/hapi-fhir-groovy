# Prometheus setup
global:
  scrape_interval: 15s # Default scrape interval

scrape_configs:
  - job_name: 'clinomic-fhir-server'
    metrics_path: '/actuator/prometheus' # Job to scrape application metrics
    scrape_interval: 5s
    static_configs:
      - targets: ['clinomic-fhir-server:9100']

  - job_name: 'infinispan-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'infinispan-server:11222' ]